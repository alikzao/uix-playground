<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UIX Sandbox</title>
  <style>
    :root {
      --bg: #0e1117;
      --panel: #151a24;
      --panel-2: #10141d;
      --text: #e8ecf3;
      --muted: #9aa6b9;
      --border: #273044;
      --left-width: 50%;
      --top-height: 84%;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    body.booting {
      overflow: hidden;
    }
    body.booting .topbar,
    body.booting .workbench {
      visibility: hidden;
    }
    .boot-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(79, 140, 255, 0.18), transparent 36%),
        linear-gradient(180deg, #0f1420 0%, #0a0f18 100%);
      z-index: 1000;
      transition: opacity 220ms ease, visibility 220ms ease;
    }
    .boot-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .boot-card {
      display: grid;
      justify-items: center;
      gap: 18px;
      padding: 28px 32px;
      color: #dce6f8;
    }
    .boot-ring {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 3px solid rgba(124, 141, 181, 0.2);
      border-top-color: #7cb7ff;
      border-right-color: #4f8cff;
      animation: uix-spin 0.9s linear infinite;
      box-shadow: 0 0 0 1px rgba(124, 183, 255, 0.08);
    }
    .boot-label {
      font-size: 13px;
      letter-spacing: 0.3px;
      color: #aebbd4;
    }
    @keyframes uix-spin {
      to { transform: rotate(360deg); }
    }
    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #121826 0%, #101521 100%);
      z-index: 20;
    }
    .topbar h1 {
      margin: 0 10px 0 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    select, button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(135deg, #4f8cff, #3c70e8);
      border: none;
    }
    button.secondary {
      background: #1d2433;
    }
    .status {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .status.ok { color: #7ce2a9; }
    .status.err { color: #ff8f95; }

    .workbench {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .top-region {
      min-height: 0;
      display: flex;
    }
    .pane {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-header {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
    }
    .editor-wrap {
      flex: 1;
      background: #0a0f18;
      position: relative;
    }
    #editor {
      width: 100%;
      height: 100%;
    }
    textarea#editorFallback {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: #d8e2f1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
      padding: 14px;
    }
    textarea#editorFallback.hidden {
      display: none;
    }
    .monaco-editor .uix-attr-token {
      color: #66d9ff !important;
      font-weight: 700 !important;
    }
    .monaco-editor .uix-attr-value-token {
      color: #ffb454 !important;
      font-weight: 500 !important;
    }
    .preview-wrap {
      flex: 1;
      background: #0b111b;
    }
    iframe#preview {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
    .logs-wrap {
      flex: 1;
      background: #0c1320;
      overflow: auto;
    }
    pre#logs {
      margin: 0;
      padding: 12px;
      color: #d2ddf1;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .gutter {
      background: #22304a;
      position: relative;
      z-index: 10;
    }
    .gutter.gutter-horizontal {
      cursor: col-resize;
      width: 6px;
    }
    .gutter.gutter-vertical {
      cursor: row-resize;
      height: 6px;
    }
    .code-pane,
    .result-pane {
      width: 50%;
    }
    .top-region,
    .logs-pane {
      height: 50%;
    }
    .code-pane { border-right: 1px solid var(--border); }
    .logs-pane { border-top: 1px solid var(--border); }

    @media (max-width: 980px) {
      .workbench {
        display: block;
      }
      .top-region {
        display: block;
        height: auto !important;
      }
      .code-pane,
      .result-pane,
      .logs-pane {
        width: 100% !important;
        height: auto !important;
      }
      .code-pane { border-right: none; border-bottom: 1px solid var(--border); }
      .result-pane { border-bottom: 1px solid var(--border); }
      .gutter { display: none !important; }
    }
  </style>
</head>
<body class="booting">
  <div class="boot-overlay" id="bootOverlay" aria-live="polite" aria-label="Loading playground">
    <div class="boot-card">
      <div class="boot-ring"></div>
      <div class="boot-label" id="bootLabel">Loading sandbox...</div>
    </div>
  </div>
  <div class="topbar">
    <h1>UIX Sandbox</h1>
    <div class="controls">
      <select id="exampleSelect"></select>
      <input
        id="externalsInput"
        type="text"
        placeholder="externals: Name=https://cdn/mod.js, Other=./local.js"
        aria-label="External modules"
      >
      <button class="primary" id="runBtn">Run</button>
      <button class="secondary" id="resetBtn">Reset</button>
      <button class="secondary" id="clearLogsBtn">Clear Logs</button>
    </div>
    <div id="status" class="status">ready</div>
  </div>

  <div class="workbench" id="workbench">
    <div class="top-region" id="topRegion">
      <section class="pane code-pane" id="codePane">
        <div class="pane-header">Code</div>
        <div class="editor-wrap">
          <div id="editor"></div>
          <textarea id="editorFallback" class="hidden" spellcheck="false"></textarea>
        </div>
      </section>

      <section class="pane result-pane" id="resultPane">
        <div class="pane-header">Result</div>
        <div class="preview-wrap">
          <iframe id="preview" sandbox="allow-scripts allow-same-origin" referrerpolicy="no-referrer" title="Sandbox result"></iframe>
        </div>
      </section>
    </div>

    <section class="pane logs-pane" id="logsPane">
      <div class="pane-header">Console</div>
      <div class="logs-wrap">
        <pre id="logs"></pre>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/split.js@1.6.5/dist/split.min.js"></script>
  <script type="module">
    import { examples, examplesById, defaultExampleId } from "./examples/index.js";

    const editorHost = document.getElementById("editor");
    const editorFallback = document.getElementById("editorFallback");
    const select = document.getElementById("exampleSelect");
    const externalsInput = document.getElementById("externalsInput");
    const runBtn = document.getElementById("runBtn");
    const resetBtn = document.getElementById("resetBtn");
    const clearLogsBtn = document.getElementById("clearLogsBtn");
    const frame = document.getElementById("preview");
    const status = document.getElementById("status");
    const logs = document.getElementById("logs");
    const bootOverlay = document.getElementById("bootOverlay");
    const bootLabel = document.getElementById("bootLabel");
    const workbench = document.getElementById("workbench");
    const topRegion = document.getElementById("topRegion");
    const codePane = document.getElementById("codePane");
    const resultPane = document.getElementById("resultPane");
    const logsPane = document.getElementById("logsPane");
    let monacoEditor = null;
    let isFallbackEditor = false;
    let bindingDecorationIds = [];
    let currentRunId = "";
    let runTimeoutId = null;
    let splitColumns = null;
    let splitRows = null;
    let initialRunStarted = false;
    let initialRunCompleted = false;
    let runnerReady = false;
    let pendingRun = false;

    const params = new URLSearchParams(window.location.search);
    const requestedExample = params.get("example");
    let currentKey = examplesById[requestedExample] ? requestedExample : defaultExampleId;
    let initialCode = examplesById[currentKey].code;
    let initialExternals = examplesById[currentKey].externals || "";

    const setEditorValue = (value) => {
      if (monacoEditor) {
        monacoEditor.setValue(value);
        return;
      }
      editorFallback.value = value;
    };

    const getEditorValue = () => {
      if (monacoEditor) {
        return monacoEditor.getValue();
      }
      return editorFallback.value;
    };

    const setExternalsValue = (value) => {
      externalsInput.value = value || "";
    };

    const showWarmEditor = () => {
      editorFallback.classList.remove("hidden");
      editorFallback.value = initialCode;
    };

    const showFallbackEditor = () => {
      isFallbackEditor = true;
      editorHost.style.display = "none";
      editorFallback.classList.remove("hidden");
      editorFallback.value = initialCode;
      setStatus("editor fallback mode", "err");
    };

    const loadMonaco = async () => {
      if (window.monaco && window.require) {
        return window.monaco;
      }
      await new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js";
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
      return await new Promise((resolve, reject) => {
        window.require.config({
          paths: {
            vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs"
          }
        });
        window.require(["vs/editor/editor.main"], () => resolve(window.monaco), reject);
      });
    };

    const initEditor = async () => {
      showWarmEditor();
      try {
        const monaco = await loadMonaco();
        monacoEditor = monaco.editor.create(editorHost, {
          value: initialCode,
          language: "javascript",
          theme: "vs-dark",
          automaticLayout: true,
          fontSize: 13,
          minimap: { enabled: false },
          scrollBeyondLastLine: false
        });
        const updateEventBindingHighlights = () => {
          const model = monacoEditor.getModel();
          if (!model) return;
          const text = model.getValue();
          const decorations = [];
          const tokenRegex = /\b(data-[a-zA-Z0-9-]+|on[A-Z][a-zA-Z0-9]*)\s*=\s*("([^"]*)"|'([^']*)')/g;

          for (const match of text.matchAll(tokenRegex)) {
            if (typeof match.index !== "number") continue;
            const full = match[0];
            const attrName = match[1];
            const attrOffsetInFull = full.indexOf(attrName);
            const valueWithQuotes = match[2];
            const valueOffsetInFull = full.indexOf(valueWithQuotes);
            const valueInnerStartInFull = valueOffsetInFull + 1;
            const valueInnerEndInFull = valueOffsetInFull + valueWithQuotes.length - 1;

            const attrStartOffset = match.index + attrOffsetInFull;
            const attrEndOffset = attrStartOffset + attrName.length;
            const attrStart = model.getPositionAt(attrStartOffset);
            const attrEnd = model.getPositionAt(attrEndOffset);

            decorations.push({
              range: new monaco.Range(attrStart.lineNumber, attrStart.column, attrEnd.lineNumber, attrEnd.column),
              options: {
                inlineClassName: "uix-attr-token",
                hoverMessage: { value: "UIX attribute" }
              }
            });

            if (valueInnerEndInFull > valueInnerStartInFull) {
              const valueStartOffset = match.index + valueInnerStartInFull;
              const valueEndOffset = match.index + valueInnerEndInFull;
              const valueStart = model.getPositionAt(valueStartOffset);
              const valueEnd = model.getPositionAt(valueEndOffset);

              decorations.push({
                range: new monaco.Range(valueStart.lineNumber, valueStart.column, valueEnd.lineNumber, valueEnd.column),
                options: {
                  inlineClassName: "uix-attr-value-token",
                  hoverMessage: { value: "UIX attribute value" }
                }
              });
            }
          }

          bindingDecorationIds = monacoEditor.deltaDecorations(bindingDecorationIds, decorations);
        };

        monacoEditor.onDidChangeModelContent(updateEventBindingHighlights);
        updateEventBindingHighlights();
        editorFallback.classList.add("hidden");
      } catch (_error) {
        showFallbackEditor();
      }
    };

    const layoutEditor = () => {
      if (monacoEditor) {
        monacoEditor.layout();
      }
    };

    for (const example of examples) {
      const opt = document.createElement("option");
      opt.value = example.id;
      opt.textContent = example.title;
      select.appendChild(opt);
    }

    const setStatus = (text, mode = "") => {
      status.textContent = text;
      status.className = `status ${mode}`.trim();
    };

    const setBootMessage = (text) => {
      bootLabel.textContent = text;
    };

    const hideBootOverlay = () => {
      if (initialRunCompleted) {
        return;
      }
      initialRunCompleted = true;
      document.body.classList.remove("booting");
      bootOverlay.classList.add("hidden");
    };

    const clearLogs = () => {
      logs.textContent = "";
    };

    const addLog = (line) => {
      logs.textContent += `${line}\n`;
      logs.parentElement.scrollTop = logs.parentElement.scrollHeight;
    };

    const loadRunner = () => {
      runnerReady = false;
      setBootMessage("Loading sandbox...");
      frame.src = `./runner.html?reload=${Date.now()}`;
    };

    const parseExternals = (raw) => {
      if (!raw || !raw.trim()) return [];
      return raw
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean)
        .map((pair) => {
          const separatorIndex = pair.indexOf("=");
          if (separatorIndex <= 0 || separatorIndex >= pair.length - 1) {
            throw new Error(`Invalid external format: "${pair}". Use Name=url`);
          }
          const name = pair.slice(0, separatorIndex).trim();
          const url = pair.slice(separatorIndex + 1).trim();
          if (!/^[A-Za-z_$][A-Za-z0-9_$]*$/.test(name)) {
            throw new Error(`Invalid external name: "${name}"`);
          }
          return { name, url };
        });
    };

    const run = () => {
      if (!runnerReady) {
        pendingRun = true;
        setBootMessage("Preparing preview...");
        setStatus("runner loading...");
        return;
      }
      pendingRun = false;
      initialRunStarted = true;
      setBootMessage("Running example...");
      clearLogs();
      currentRunId = `run-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      if (runTimeoutId) {
        clearTimeout(runTimeoutId);
      }
      let externals = [];
      try {
        externals = parseExternals(externalsInput.value);
      } catch (error) {
        setStatus(error.message || "invalid externals", "err");
        addLog(String(error.message || error));
        return;
      }
      frame.contentWindow.postMessage(
        { type: "uix:run", code: getEditorValue(), runId: currentRunId, externals },
        window.location.origin
      );
      runTimeoutId = window.setTimeout(() => {
        setStatus("execution timeout, runner restarted", "err");
        pendingRun = true;
        loadRunner();
      }, 2500);
      setStatus("running...");
    };

    select.value = currentKey;

    select.addEventListener("change", () => {
      currentKey = select.value;
      initialCode = examplesById[currentKey].code;
      initialExternals = examplesById[currentKey].externals || "";
      setEditorValue(initialCode);
      setExternalsValue(initialExternals);
      const nextUrl = `${window.location.pathname}?example=${encodeURIComponent(currentKey)}`;
      window.history.replaceState(null, "", nextUrl);
      run();
    });

    runBtn.addEventListener("click", run);
    resetBtn.addEventListener("click", () => {
      initialCode = examplesById[currentKey].code;
      initialExternals = examplesById[currentKey].externals || "";
      setEditorValue(initialCode);
      setExternalsValue(initialExternals);
      run();
    });
    clearLogsBtn.addEventListener("click", clearLogs);

    const initSplitLayout = () => {
      if (window.innerWidth <= 980) {
        return;
      }

      const Split = window.Split;
      if (typeof Split !== "function") {
        setStatus("split unavailable", "err");
        return;
      }

      splitColumns = Split([codePane, resultPane], {
        sizes: [50, 50],
        minSize: [220, 220],
        gutterSize: 6,
        direction: "horizontal",
        onDrag: () => {
          layoutEditor();
        }
      });

      splitRows = Split([topRegion, logsPane], {
        sizes: [84, 16],
        minSize: [180, 130],
        gutterSize: 6,
        direction: "vertical",
        onDrag: () => {
          layoutEditor();
        }
      });
    };

    window.addEventListener("resize", () => {
      layoutEditor();
    });

    window.addEventListener("message", (event) => {
      if (event.origin !== window.location.origin) return;
      if (event.source !== frame.contentWindow) return;
      if (!event.data) return;
      if (event.data.type === "uix:ready") {
        runnerReady = true;
        if (pendingRun || !initialRunStarted) {
          run();
        }
        return;
      }
      if (event.data.type === "uix:status") {
        if (event.data.runId !== currentRunId) return;
        if (runTimeoutId) {
          clearTimeout(runTimeoutId);
          runTimeoutId = null;
        }
        if (event.data.ok) {
          setStatus("ok", "ok");
        } else {
          setStatus(event.data.error || "runtime error", "err");
        }
        hideBootOverlay();
        return;
      }
      if (event.data.type === "uix:log") {
        if (event.data.runId !== currentRunId) return;
        addLog(event.data.message || "");
      }
    });

    setExternalsValue(initialExternals);
    pendingRun = true;
    loadRunner();
    await initEditor();
    initSplitLayout();
    if (isFallbackEditor) {
      setEditorValue(initialCode);
    }
  </script>
</body>
</html>
